version: '3.7'

services:
  mongodb:
    image: mongo:latest
    restart: on-failure
    environment:
#      - MONGO_INITDB_ROOT_DATABASE=${MONGO_ROOT_DB:-}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:-example}
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_DB:-root}
    networks:
      - services
    ports:
      - '27017:27017'
    expose:
      - '27017'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - mongodb-data:/data/db
      - mongodb-log:/var/log/mongodb
      - ./mongo-init.sh:/docker-entrypoint-initdb.d/mongo-init.sh:ro



#  mongo-express:
#    image: mongo-express
#    restart: always
#    ports:
#      - 8081:8081
#    environment:
#      ME_CONFIG_MONGODB_ADMINUSERNAME: root
#      ME_CONFIG_MONGODB_ADMINPASSWORD: example
#      ME_CONFIG_MONGODB_URL: mongodb://root:example@mongo:27017/

networks:
  services:
    name: ${MONGO_NETWORK:-mongodb.network}

volumes:
  mongodb-data:
    driver: local
  mongodb-log:
    driver: local